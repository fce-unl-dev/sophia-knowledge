name: Propose Sections KB

# Genera un PR humano con cambios de las ramas WordPress completas del sitio FCE
# (/academica/, /docentes/, /institucional/, /ciencia/, /extension/,
# /internacionales/). Multi-output: un MD por subpágina importante.
# No mergea directo a main. auto_merge solo si classifyDiff lo permite y el
# crawl no quedó truncado ni hay señales de revisión.

on:
  schedule:
    # Lunes y jueves a las 07:00 UTC (04:00 ART). Una hora después de sync-kb
    # para no competir por runners.
    - cron: '0 7 * * 1,4'
  workflow_dispatch:
    inputs:
      section:
        description: 'sectionId específico (ej. academica) o vacío para todas las secciones.'
        required: false
        default: ''
        type: string
      mode:
        description: 'Modo de ejecución'
        required: true
        default: 'refresh'
        type: choice
        options:
          - refresh
          - force
          - dry-run
      triggered_by:
        description: 'Quién disparó este run (email o nombre para audit log).'
        required: false
        default: 'manual'
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: propose-sections-kb
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate sections proposal
        id: proposal
        working-directory: tools/scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          extra_args=""
          if [ "${{ inputs.mode }}" = "force" ]; then
            extra_args="$extra_args --force"
          fi
          if [ "${{ inputs.mode }}" = "dry-run" ]; then
            extra_args="$extra_args --dry-run"
          fi
          if [ -n "${{ inputs.section }}" ]; then
            extra_args="$extra_args --section=${{ inputs.section }}"
          fi

          node propose_sections_update.mjs \
            --kb-root=../.. \
            --pr-body=/tmp/sections-pr-body.md \
            $extra_args > /tmp/sections-proposal.json
          # ok:false (rejected) sale con exit 1; no debe abortar el reporte.
          set -e

          cat /tmp/sections-proposal.json
          decision=$(jq -r '.decision' /tmp/sections-proposal.json)
          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          echo "### Sections proposal" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/sections-pr-body.md >> "$GITHUB_STEP_SUMMARY"

      - name: Report no change
        if: steps.proposal.outputs.decision == 'no_change'
        run: |
          echo "No hay cambios de secciones para proponer. No se abre PR."

      - name: Stop on dry-run
        if: inputs.mode == 'dry-run'
        run: |
          echo "Dry-run completado. No se abre PR ni se pushea ninguna rama."

      - name: Open human-review PR
        if: inputs.mode != 'dry-run' && (steps.proposal.outputs.decision == 'auto_merge' || steps.proposal.outputs.decision == 'requires_review')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          branch="kb-sync/update-secciones"
          decision='${{ steps.proposal.outputs.decision }}'

          git config user.name 'sophia-kb-bot'
          git config user.email 'bot@fce.unl.edu.ar'
          git checkout -B "$branch"

          git add indice.json routing_metadata.json \
            academica docentes institucional ciencia extension internacionales

          if git diff --cached --quiet; then
            echo "La propuesta no produjo diff commiteable. No se abre PR."
            exit 0
          fi

          if [ "$decision" = "requires_review" ]; then
            title="KB sync: secciones web — requiere revisión humana"
            label="needs-review"
          else
            title="KB sync: secciones web — update automático"
            label="auto-update"
          fi

          git commit -m "chore(kb): propose sections update ($decision)"
          git push -f origin "$branch"

          gh label create needs-review --color D97706 --description "Requiere revisión humana antes de mergear" || true
          gh label create auto-update --color 2563EB --description "Cambio KB de bajo riesgo propuesto por sync automático" || true

          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --label "$label" \
            --body-file /tmp/sections-pr-body.md || \
          gh pr edit "$branch" \
            --title "$title" \
            --body-file /tmp/sections-pr-body.md

          if [ "$decision" = "auto_merge" ]; then
            gh pr merge "$branch" --squash --delete-branch || gh pr merge "$branch" --auto --squash || echo "No se pudo auto-mergear. Se requerirá merge manual o la repo no lo soporta."
          fi

      - name: Report rejected
        if: steps.proposal.outputs.decision == 'rejected'
        run: |
          echo "::warning::La propuesta de secciones fue rechazada por validación defensiva (crawl vacío, path inseguro o sectionId desconocido). Revisar logs y summary."
