name: Sync KB

# Sincroniza el KB con las fuentes web definidas en tools/scraper/sources.json.
# Puede dispararse manualmente (UI de GH Actions o dashboard admin del agente)
# o automáticamente los lunes y jueves a las 06:00 UTC.
#
# Contrato vigente:
#   - Detectar cambios y proponerlos por PR.
#   - No pushear contenido directo a main.
#   - Auto-merge SOLO para cambios de bajo riesgo que pasen el gate de validación
#     (validate_index + validate_links). Lo demás queda como PR para revisión humana.
#
# Decisiones por slug (las toma run_pipeline.mjs):
#   no_change          → no abre PR y no toca main
#   auto_merge         → bajo riesgo; abre PR y, si pasa el gate de validación, se mergea solo
#   requires_review    → abre PR con revisión requerida (no se auto-mergea)
#   rejected           → validación falló; NO commitea
#   error              → fallo técnico; NO commitea
#   skipped            → strategy=TBD, no se procesa
#
# Modo dry-run: corre todo pero no escribe al repo. Útil para validar antes de
# hacer cambios reales o para inspeccionar qué decisión tomaría el pipeline.

on:
  schedule:
    # Lunes y jueves a las 06:00 UTC (03:00 ART). Detecta cambios en la web FCE
    # y propone PRs automáticamente sin intervención manual.
    - cron: '0 6 * * 1,4'
  workflow_dispatch:
    inputs:
      source:
        description: 'Slug específico (ej. mba) o "all" para procesar todas las fuentes no-TBD.'
        required: true
        default: 'all'
        type: string
      mode:
        description: 'Modo de ejecución'
        required: true
        default: 'refresh'
        type: choice
        options:
          - refresh
          - force
          - dry-run
      triggered_by:
        description: 'Quién disparó este run (email o nombre para audit log).'
        required: false
        default: 'manual'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Permite múltiples runs en paralelo pero serializa por slug.
  # En triggers de schedule, inputs.source es vacío → usamos 'all' como group.
  group: sync-kb-${{ inputs.source || 'all' }}
  cancel-in-progress: false

jobs:
  list-slugs:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.compute.outputs.slugs }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute slug matrix
        id: compute
        run: |
          # En triggers de schedule, inputs.source está vacío → procesar todas las fuentes.
          source_input="${{ inputs.source }}"
          if [ -z "$source_input" ] || [ "$source_input" = "all" ]; then
            # Excluye TBD (no implementada) y fce-wordpress-section (multi-output:
            # la procesa el workflow dedicado propose-sections-kb.yml, no run_pipeline).
            slugs=$(jq -c '[.sources[] | select(.strategy != "TBD" and .strategy != "fce-wordpress-section") | .slug]' tools/scraper/sources.json)
          else
            slugs=$(jq -cn --arg s "$source_input" '[$s]')
          fi
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          echo "Slugs a procesar: $slugs"

  sync:
    needs: list-slugs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        slug: ${{ fromJson(needs.list-slugs.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run pipeline for ${{ matrix.slug }}
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: tools/scraper
        run: |
          set +e
          # En triggers de schedule, inputs.mode está vacío → usar 'refresh' como default seguro.
          run_mode="${{ inputs.mode }}"
          if [ -z "$run_mode" ]; then run_mode="refresh"; fi
          node run_pipeline.mjs --slug=${{ matrix.slug }} --mode="$run_mode" > /tmp/report.json
          exit_code=$?
          echo "exit_code=$exit_code"
          cat /tmp/report.json
          decision=$(jq -r '.decision' /tmp/report.json)
          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          # Errores y rejected NO bloquean al resto de la matrix; loguean y siguen
          exit 0

      - name: Open PR for generated candidate
        # En schedule, inputs.mode está vacío (no es 'dry-run') → la condición se evalúa correctamente.
        if: inputs.mode != 'dry-run' && (steps.pipeline.outputs.decision == 'auto_merge' || steps.pipeline.outputs.decision == 'requires_review')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          slug='${{ matrix.slug }}'
          decision='${{ steps.pipeline.outputs.decision }}'
          kb_path=$(jq -r --arg slug "$slug" '.sources[] | select(.slug==$slug) | .indice_path' tools/scraper/sources.json)
          sensitive=$(jq -r '(.sensitive_changes // []) | join(", ")' /tmp/report.json)
          changed=$(jq -r '(.changed_sections // []) | join(", ")' /tmp/report.json)
          reason=$(jq -r '.reason // "sin motivo informado"' /tmp/report.json)
          branch="kb-sync/update-${slug}"

          git config user.name 'sophia-kb-bot'
          git config user.email 'bot@fce.unl.edu.ar'
          git checkout -B "$branch"

          mkdir -p "$(dirname "$kb_path")"
          cp "tools/scraper/state/$slug.candidate.md" "$kb_path"
          git add "$kb_path" "tools/scraper/state/$slug.meta.json"

          if git diff --cached --quiet; then
            echo "No candidate diff for $slug"
            exit 0
          fi

          if [ "$decision" = "requires_review" ]; then
            title="KB sync: $slug — requiere revisión humana"
            label="needs-review"
            review_note="Este PR requiere revisión porque cambió al menos una sección sensible o el pipeline detectó riesgo."
            disclaimer="No hay merge automático. El cambio solo entra al KB si este PR se revisa y mergea manualmente."
          else
            title="KB sync: $slug — update automático"
            label="auto-update"
            review_note="El pipeline clasificó este cambio como bajo riesgo. El bot intentará mergear esto automáticamente."
            disclaimer="Merge automático habilitado por bajo riesgo."
          fi

          git commit -m "chore(kb): propose sync for $slug ($decision)"
          git push -f origin "$branch"

          gh label create needs-review --color D97706 --description "Requiere revisión humana antes de mergear" || true
          gh label create auto-update --color 2563EB --description "Cambio KB de bajo riesgo propuesto por sync automático" || true

          triggered_by="${{ inputs.triggered_by }}"
          if [ -z "$triggered_by" ]; then triggered_by="cron automático"; fi

          cat > /tmp/pr_body.md <<EOF
          Pipeline automático de sync del KB de Sophia.

          **Disparado por**: $triggered_by
          **Fuente**: \`$slug\`
          **Archivo KB**: \`$kb_path\`
          **Decisión pipeline**: \`$decision\`
          **Motivo**: $reason
          **Secciones cambiadas**: ${changed:-N/D}
          **Secciones sensibles afectadas**: ${sensitive:-N/D}

          ## Política B.2

          $review_note

          $disclaimer

          ## Cómo revisar

          1. Mirar el diff de \`$kb_path\`.
          2. Verificar datos sensibles contra la fuente oficial declarada.
          3. Si todo está correcto, aprobar y mergear.
          4. Si hay dudas, dejar comentario o cerrar sin mergear.
          EOF

          gh pr create \
            --base main \
            --head "$branch" \
            --title "$title" \
            --label "$label" \
            --body-file /tmp/pr_body.md || \
          gh pr edit "$branch" \
            --title "$title" \
            --body-file /tmp/pr_body.md

          if [ "$decision" = "auto_merge" ]; then
            echo "Gate de validación previo al auto-merge…"
            if ( cd tools/scraper && node validate_index.mjs --kb-root=../.. --json && node validate_links.mjs --kb-root=../.. --json ); then
              gh pr merge "$branch" --squash --delete-branch \
                || gh pr merge "$branch" --auto --squash --delete-branch \
                || echo "::warning::Validación OK pero no se pudo auto-mergear; queda para merge manual."
            else
              echo "::warning::Validación falló: NO se auto-mergea. El PR queda para revisión humana."
              gh pr edit "$branch" --add-label needs-review --remove-label auto-update || true
            fi
          fi

      - name: Report no_change/skipped
        if: steps.pipeline.outputs.decision == 'no_change' || steps.pipeline.outputs.decision == 'skipped'
        run: |
          slug='${{ matrix.slug }}'
          decision='${{ steps.pipeline.outputs.decision }}'
          echo "Pipeline para $slug terminó en $decision. No se abre PR ni se toca main."

      - name: Report rejected/error
        if: steps.pipeline.outputs.decision == 'rejected' || steps.pipeline.outputs.decision == 'error'
        run: |
          slug='${{ matrix.slug }}'
          decision='${{ steps.pipeline.outputs.decision }}'
          echo "::warning::Pipeline para $slug terminó en $decision. Ver report en log anterior."
          # No abortar la matrix; otros slugs deben poder seguir.
